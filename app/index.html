<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shipzobuy — Cross-Border Purchasing Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue: #0456f8;
    --orange: #fe6412;
    --dark: #0a0e17;
    --darker: #060a12;
    --surface: #111827;
    --surface2: #1a2235;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #e8edf5;
    --muted: #7a8799;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--sans);
    background: var(--darker);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: 56px;
    background: rgba(6, 10, 18, 0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 40px;
    gap: 32px;
  }
  .nav-logo {
    display: flex; align-items: center; gap: 10px;
    text-decoration: none;
  }
  .nav-logo img { height: 26px; width: auto; }
  .nav-links { display: flex; gap: 28px; margin-left: auto; align-items: center; }
  .nav-links a {
    font-size: 13px; color: var(--muted); text-decoration: none;
    letter-spacing: 0.02em;
    transition: color 0.15s;
  }
  .nav-links a:hover { color: var(--text); }
  .nav-cta {
    background: var(--blue);
    color: #fff !important;
    padding: 7px 16px;
    border-radius: 4px;
    font-size: 13px !important;
    font-weight: 500;
    letter-spacing: 0.02em;
    transition: opacity 0.15s !important;
  }
  .nav-cta:hover { opacity: 0.88; }

  /* HERO */
  .hero {
    min-height: 100vh;
    padding: 120px 40px 80px;
    display: flex; align-items: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 70% 50%, rgba(4, 86, 248, 0.07) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 20% 80%, rgba(254, 100, 18, 0.04) 0%, transparent 60%);
    pointer-events: none;
  }
  .hero-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    max-width: 1200px;
    margin: 0 auto;
    align-items: center;
    width: 100%;
  }
  .hero-eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--orange);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 8px;
  }
  .hero-eyebrow::before {
    content: '';
    display: block; width: 20px; height: 1px;
    background: var(--orange);
  }
  h1 {
    font-family: var(--sans);
    font-size: clamp(36px, 4vw, 52px);
    font-weight: 300;
    line-height: 1.12;
    letter-spacing: -0.02em;
    margin-bottom: 24px;
  }
  h1 strong {
    font-weight: 600;
    color: #fff;
  }
  h1 .accent { color: var(--blue); }
  .hero-desc {
    font-size: 15px;
    color: var(--muted);
    line-height: 1.7;
    max-width: 460px;
    margin-bottom: 40px;
  }
  .hero-actions { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .btn-primary {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--blue);
    color: #fff;
    padding: 12px 22px;
    border-radius: 4px;
    font-size: 14px; font-weight: 500;
    text-decoration: none;
    transition: opacity 0.15s;
  }
  .btn-primary:hover { opacity: 0.88; }
  .btn-secondary {
    display: inline-flex; align-items: center; gap: 8px;
    background: transparent;
    color: var(--text);
    padding: 11px 22px;
    border-radius: 4px;
    border: 1px solid var(--border2);
    font-size: 14px; font-weight: 400;
    text-decoration: none;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-secondary:hover { border-color: rgba(255,255,255,0.3); color: #fff; }
  .hero-meta {
    margin-top: 48px;
    display: flex; gap: 32px;
    padding-top: 32px;
    border-top: 1px solid var(--border);
  }
  .meta-stat { }
  .meta-num {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 500;
    color: #fff;
  }
  .meta-label {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* PHONE MOCKUP */
  .phone-wrap {
    display: flex; justify-content: center; align-items: center;
    position: relative;
  }
  .phone-outer {
    width: 260px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 38px;
    padding: 14px;
    position: relative;
    box-shadow:
      0 0 0 1px rgba(4,86,248,0.2),
      0 40px 80px rgba(0,0,0,0.6);
  }
  .phone-notch {
    width: 80px; height: 20px;
    background: var(--dark);
    border-radius: 0 0 14px 14px;
    margin: 0 auto 10px;
  }
  .phone-screen {
    background: #0d1421;
    border-radius: 26px;
    overflow: hidden;
    min-height: 460px;
  }
  .phone-statusbar {
    background: #0d1421;
    padding: 8px 16px 4px;
    display: flex; justify-content: space-between;
    font-family: var(--mono); font-size: 10px; color: rgba(255,255,255,0.4);
  }
  .phone-topbar {
    background: #111a2e;
    padding: 12px 14px;
    display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .phone-topbar-icon {
    width: 26px; height: 26px;
    background: var(--blue);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .phone-topbar-title {
    font-size: 13px; font-weight: 600; color: #fff;
  }
  .phone-topbar-sub {
    font-family: var(--mono); font-size: 9px; color: var(--muted);
  }
  .phone-body { padding: 12px; }
  .phone-searchbar {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 6px;
  }
  .phone-card {
    background: var(--surface2);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 10px;
    padding: 10px;
    margin-bottom: 8px;
    display: flex; gap: 10px; align-items: center;
  }
  .phone-card-img {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, #1a2a4a, #243555);
    border-radius: 7px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .phone-card-title { font-size: 11px; color: #c8d4e8; font-weight: 500; margin-bottom: 3px; }
  .phone-card-sub { font-family: var(--mono); font-size: 9px; color: var(--muted); margin-bottom: 5px; }
  .phone-card-price {
    font-family: var(--mono); font-size: 12px;
    color: var(--orange); font-weight: 500;
  }
  .phone-badge {
    display: inline-block;
    background: rgba(4,86,248,0.15);
    color: #6f9ff7;
    border-radius: 3px;
    font-size: 8px;
    padding: 2px 5px;
    font-family: var(--mono);
    margin-left: 4px;
  }
  .phone-home {
    width: 40px; height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    margin: 14px auto 6px;
  }

  /* SECTION SHARED */
  section { padding: 100px 40px; }
  .section-inner { max-width: 1200px; margin: 0 auto; }
  .section-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  h2 {
    font-size: clamp(24px, 3vw, 36px);
    font-weight: 300;
    line-height: 1.2;
    margin-bottom: 16px;
    letter-spacing: -0.02em;
  }
  h2 strong { font-weight: 600; color: #fff; }

  /* HOW IT WORKS */
  .how { background: var(--darker); border-top: 1px solid var(--border); }
  .steps {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    margin-top: 60px;
    position: relative;
  }
  .steps::before {
    content: '';
    position: absolute;
    top: 18px; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border2) 10%, var(--border2) 90%, transparent);
  }
  .step { padding: 0 24px; position: relative; }
  .step:first-child { padding-left: 0; }
  .step-num {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid var(--border2);
    background: var(--dark);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 11px; color: var(--muted);
    margin-bottom: 20px;
    position: relative; z-index: 1;
  }
  .step:first-child .step-num { border-color: var(--blue); color: var(--blue); }
  .step-title {
    font-size: 14px; font-weight: 500;
    color: #fff; margin-bottom: 8px;
  }
  .step-desc { font-size: 13px; color: var(--muted); line-height: 1.6; }

  /* PLATFORMS */
  .platforms { background: var(--surface); border-top: 1px solid var(--border); }
  .platform-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    margin-top: 60px;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .platform-item {
    background: var(--surface);
    padding: 32px 28px;
    transition: background 0.15s;
  }
  .platform-item:hover { background: var(--surface2); }
  .platform-name {
    font-size: 16px; font-weight: 600; color: #fff;
    margin-bottom: 6px;
  }
  .platform-origin {
    font-family: var(--mono); font-size: 10px;
    color: var(--muted); letter-spacing: 0.06em;
    margin-bottom: 12px; text-transform: uppercase;
  }
  .platform-desc { font-size: 13px; color: var(--muted); line-height: 1.6; }
  .platform-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--blue); display: inline-block;
    margin-right: 6px;
  }

  /* FEATURES */
  .features { background: var(--darker); border-top: 1px solid var(--border); }
  .feature-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    margin-top: 60px;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .feature-item {
    background: var(--darker);
    padding: 32px;
  }
  .feature-icon {
    width: 36px; height: 36px;
    background: rgba(4,86,248,0.1);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 16px;
    font-size: 16px;
  }
  .feature-title {
    font-size: 14px; font-weight: 500; color: #fff;
    margin-bottom: 8px;
  }
  .feature-desc { font-size: 13px; color: var(--muted); line-height: 1.65; }

  /* DOWNLOAD */
  .download {
    background: var(--surface);
    border-top: 1px solid var(--border);
  }
  .download-inner {
    max-width: 800px; margin: 0 auto;
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 60px; align-items: center;
  }
  .download h2 { margin-bottom: 12px; }
  .download-sub { font-size: 14px; color: var(--muted); line-height: 1.7; margin-bottom: 32px; }
  .qr-wrap {
    display: flex; flex-direction: column; align-items: center;
    gap: 16px;
  }
  .qr-box {
    width: 140px; height: 140px;
    background: #fff;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    padding: 10px;
    position: relative;
  }
  .qr-box svg { width: 100%; height: 100%; }
  .qr-label {
    font-family: var(--mono);
    font-size: 10px; color: var(--muted);
    letter-spacing: 0.08em; text-transform: uppercase;
    text-align: center;
  }
  .url-pill {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border2);
    border-radius: 4px;
    padding: 8px 14px;
    font-family: var(--mono); font-size: 12px; color: #6f9ff7;
    text-decoration: none;
    transition: border-color 0.15s;
  }
  .url-pill:hover { border-color: var(--blue); }

  /* FOOTER */
  footer {
    background: var(--darker);
    border-top: 1px solid var(--border);
    padding: 40px;
  }
  .footer-inner {
    max-width: 1200px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 16px;
  }
  .footer-logo { display: flex; align-items: center; gap: 10px; }
  .footer-logo img { height: 20px; }
  .footer-links { display: flex; gap: 24px; }
  .footer-links a { font-size: 12px; color: var(--muted); text-decoration: none; }
  .footer-links a:hover { color: var(--text); }
  .footer-copy { font-size: 12px; color: var(--muted); font-family: var(--mono); }

  @media (max-width: 900px) {
    .hero-grid { grid-template-columns: 1fr; gap: 60px; }
    .phone-wrap { display: none; }
    .steps { grid-template-columns: 1fr 1fr; }
    .platform-grid { grid-template-columns: 1fr 1fr; }
    .feature-grid { grid-template-columns: 1fr 1fr; }
    .download-inner { grid-template-columns: 1fr; }
    nav { padding: 0 20px; }
    section { padding: 70px 20px; }
  }
</style>
</head>
