<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting...</title>

  <!-- Fallback redirect -->
  <meta http-equiv="refresh" content="3;url=https://oem.shipzobuy.com/legal-hub" />

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: #ffffff;
    }
    .box {
      text-align: center;
    }
    .loader {
      margin: 20px auto;
      border: 4px solid #333;
      border-top: 4px solid #fff;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <div class="box">
    <h2>Getting response from Vercel CDN</h2>
    <div class="loader"></div>
    <p>You will be redirected shortly.</p>
  </div>

  <script>
    setTimeout(() => {
      window.location.href = "https://oem.shipzobuy.com/legal-hub";
    }, 3000);
  </script>
</body>
</html>
