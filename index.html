<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>403 | Access Denied</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0b0f19;
      color: #e5e7eb;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    .box {
      text-align: center;
      padding: 32px;
      border: 1px solid #1f2937;
      border-radius: 10px;
      background: #0f172a;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.03);
    }

    .code {
      font-size: 64px;
      font-weight: 700;
      color: #ef4444;
      margin-bottom: 10px;
    }

    .title {
      font-size: 18px;
      margin-bottom: 8px;
      color: #f3f4f6;
    }

    .desc {
      font-size: 13px;
      color: #9ca3af;
    }

    .meta {
      margin-top: 16px;
      font-size: 12px;
      color: #6b7280;
    }

    .btn {
      margin-top: 18px;
      display: inline-block;
      padding: 8px 12px;
      border: 1px solid #374151;
      border-radius: 6px;
      color: #e5e7eb;
      text-decoration: none;
      font-size: 12px;
    }

    .btn:hover {
      background: #111827;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="code">403</div>
    <div class="title">Access Denied</div>
    <div class="desc">You don’t have permission to view this resource.</div>

    <div class="meta">
      error_code: forbidden_access<br>
      timestamp: <span id="time"></span>
    </div>

    <a class="btn" href="https://go.shipzobuy.com/outage">Report a outage</a>
  </div>

  <script>
    document.getElementById("time").textContent = new Date().toISOString();
  </script>
</body>
</html>
